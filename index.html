<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Drop Explorer</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout-toolbar">
    <div class="layout-title">Workspace</div>
    <div class="layout-controls">
      <div class="layout-presets" aria-label="Grid layouts">
        <button class="layout-preset-btn" data-layout="balanced" title="Balanced 2x2">Balanced</button>
        <button class="layout-preset-btn" data-layout="mission-focus" title="Mission details focus">Mission Focus</button>
        <button class="layout-preset-btn" data-layout="planner-focus" title="Farm planner focus">Planner Focus</button>
        <button class="layout-preset-btn" data-layout="columns" title="Column layout">Columns</button>
      </div>
      <button class="layout-toggle-btn" data-target="searchSection">Search Left</button>
      <button class="layout-toggle-btn" data-target="plannerSection">Farm Planner</button>
      <button class="layout-toggle-btn" data-target="pinnedSection">Pinned</button>
      <button class="layout-toggle-btn" data-target="missionSection">Mission Details</button>
      <button id="resetLayoutBtn" class="secondary-btn">Reset layout</button>
    </div>
  </div>

  <div id="workspaceGrid" class="workspace-grid">
    <section id="searchSection" class="dock-panel" draggable="true">
      <div class="dock-header"><span class="drag-handle">⋮⋮</span>Search left</div>
      <div class="dock-content panel-left">
        <h3>Filters</h3>

        <label for="planetFilter" class="input-label">Planet</label>
        <select id="planetFilter">
          <option value="All">All Planets</option>
        </select>

        <label for="typeFilter" class="input-label">Mission Type</label>
        <select id="typeFilter">
          <option value="All">All Mission Types</option>
        </select>

        <label for="itemSearch" class="input-label">Drop Search</label>
        <input
          type="text"
          id="itemSearch"
          class="search-input"
          placeholder="Search for an item (e.g. Khora)..."
        >
        <button id="resetFilters" class="secondary-btn">Reset filters</button>
        <div id="resultCount" class="result-count"></div>

        <table id="locationTable" class="display location-table">
          <thead>
            <tr>
              <th>Mission</th>
              <th>Planet</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="plannerSection" class="dock-panel" draggable="true">
      <div class="dock-header"><span class="drag-handle">⋮⋮</span>Farm planner</div>
      <div class="dock-content panel-main">
        <div class="planner-card">
          <div class="planner-header">
            <h3>Farm Planner</h3>
            <small>Find the fastest mission for a target drop</small>
          </div>
          <label for="plannerSearch" class="input-label">Item Name</label>
          <input
            type="text"
            id="plannerSearch"
            class="search-input"
            placeholder="Type an item name to find best farms (e.g. Neurodes, Khora Chassis)..."
          >
          <label class="toggle-row">
            <input type="checkbox" id="plannerWarframeOnly">
            <span>Warframes only</span>
          </label>
          <div id="plannerResults" class="planner-results">
            <div class="empty-msg">Search an item to see best drop locations.</div>
          </div>
        </div>
      </div>
    </section>

    <section id="missionSection" class="dock-panel" draggable="true">
      <div class="dock-header"><span class="drag-handle">⋮⋮</span>Mission details</div>
      <div class="dock-content panel-main">
        <div id="missionCard" class="mission-card">
          <button id="mainPinBtn" class="pin-btn">☆</button>

          <div id="cardCategory" class="card-category"></div>
          <h2 id="cardTitle" class="card-title"></h2>
          <div id="missionProgress" class="mission-progress"></div>

          <div id="guideAnchor"></div>
          <div id="rotNav" class="rot-nav"></div>

          <h3 class="section-label accent">LOOT POOL</h3>
          <div class="run-counter-controls">
            <div id="runCounterLabel" class="run-counter-label">Completed runs: 0</div>
            <div class="run-counter-actions">
              <button id="addRunBtn" class="secondary-btn">+1 Run</button>
              <button id="resetRunBtn" class="secondary-btn">Reset</button>
            </div>
          </div>
          <table class="drop-table">
            <tbody id="cardDrops"></tbody>
          </table>
          <div id="paginationAnchor"></div>

          <div class="obtained-section">
            <div class="obtained-header">
              <h3 class="section-label success">✔ OBTAINED</h3>
              <label class="hide-toggle">
                <input type="checkbox" id="hideObtained">
                Hide
              </label>
            </div>

            <table class="drop-table" id="obtainedTable">
              <tbody id="obtainedDrops"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section id="pinnedSection" class="dock-panel" draggable="true">
      <div class="dock-header"><span class="drag-handle">⋮⋮</span>Pinned</div>
      <div class="dock-content panel-right">
        <div class="pinned-header">
          <h3>Pinned</h3>
          <button id="clearPins" class="clear-btn">CLEAR ALL</button>
        </div>
        <div id="pinnedList"></div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
