<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Drop Explorer</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="panel-left">
    <h3>Filters</h3>

    <label for="planetFilter" class="input-label">Planet</label>
    <select id="planetFilter">
      <option value="All">All Planets</option>
    </select>

    <label for="typeFilter" class="input-label">Mission Type</label>
    <select id="typeFilter">
      <option value="All">All Mission Types</option>
    </select>

    <label for="itemSearch" class="input-label">Drop Search</label>
    <input
      type="text"
      id="itemSearch"
      class="search-input"
      placeholder="Search for an item (e.g. Khora)..."
    >
    <button id="resetFilters" class="secondary-btn">Reset filters</button>
    <div id="resultCount" class="result-count"></div>

    <table id="locationTable" class="display location-table">
      <thead>
        <tr>
          <th>Mission</th>
          <th>Planet</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </aside>

  <main class="panel-main">
    <div class="planner-card">
      <div class="planner-header">
        <h3>Farm Planner</h3>
        <small>Find the fastest mission for a target drop</small>
      </div>
      <label for="plannerSearch" class="input-label">Item Name</label>
      <input
        type="text"
        id="plannerSearch"
        class="search-input"
        placeholder="Type an item name to find best farms (e.g. Neurodes, Khora Chassis)..."
      >
      <div id="plannerResults" class="planner-results">
        <div class="empty-msg">Search an item to see best drop locations.</div>
      </div>
    </div>

    <div id="missionCard" class="mission-card">
      <button id="mainPinBtn" class="pin-btn">☆</button>

      <div id="cardCategory" class="card-category"></div>
      <h2 id="cardTitle" class="card-title"></h2>
      <div id="missionProgress" class="mission-progress"></div>

      <div id="guideAnchor"></div>
      <div id="rotNav" class="rot-nav"></div>

      <h3 class="section-label accent">LOOT POOL</h3>
      <table class="drop-table">
        <tbody id="cardDrops"></tbody>
      </table>
      <div id="paginationAnchor"></div>

      <div class="obtained-section">
        <div class="obtained-header">
          <h3 class="section-label success">✔ OBTAINED</h3>
          <label class="hide-toggle">
            <input type="checkbox" id="hideObtained">
            Hide
          </label>
        </div>

        <table class="drop-table" id="obtainedTable">
          <tbody id="obtainedDrops"></tbody>
        </table>
      </div>
    </div>
  </main>

  <aside class="panel-right">
    <div class="pinned-header">
      <h3>Pinned</h3>
      <button id="clearPins" class="clear-btn">CLEAR ALL</button>
    </div>
    <div id="pinnedList"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
